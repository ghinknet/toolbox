name: Refresh gosumdb on release

on:
  release:
    types: [published]
  push:
    branches:
      - '**'
    tags:
      - 'v*'
      - '*'

jobs:
  refresh:
    if: "startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'"
    runs-on: go-1.26.2-alpine

    steps:
      - name: Ensure git is available and checkout repository
        shell: sh
        run: |
          set -eux

          # Install git in Alpine if missing (we prefer installing git over node)
          if ! command -v git >/dev/null 2>&1; then
            apk add --no-cache git openssh-client ca-certificates
          fi

          # If repo already present (some runners mount workspace), skip cloning
          if [ -d .git ]; then
            echo "Repository already present, skipping clone."
            git rev-parse --abbrev-ref HEAD || true
            exit 0
          fi

          # Determine clone URL: allow override via GIT_CLONE_URL, otherwise try common CI vars
          CLONE_URL="${GIT_CLONE_URL:-}"
          if [ -z "$CLONE_URL" ]; then
            if [ -n "${GITEA_REPOSITORY:-}" ]; then
              # GITEA_REPOSITORY often looks like owner/repo
              CLONE_URL="${GITEA_SERVER_URL:-https://gitea.example}/${GITEA_REPOSITORY}.git"
            elif [ -n "${GITHUB_REPOSITORY:-}" ]; then
              CLONE_URL="${GITHUB_SERVER_URL:-https://github.com}/${GITHUB_REPOSITORY}.git"
            fi
          fi

          if [ -z "$CLONE_URL" ]; then
            echo "No clone URL detected. Set GIT_CLONE_URL workflow variable (e.g. https://gitea.example/owner/repo.git)."
            exit 1
          fi

          echo "Cloning $CLONE_URL"
          # Shallow clone is usually sufficient; fallback to full clone if branch/ref not found
          git clone --depth=1 "${REF:-}" "$CLONE_URL" . 2>/dev/null || git clone --depth=1 "$CLONE_URL" .

          # Ensure tags are available for later steps
          git fetch --tags --prune --force origin || true

      - name: Fetch tags
        shell: sh
        run: |
          # Ensure tags are available for `git describe` on the runner
          git fetch --tags --prune --force origin || true

      - name: Determine module and tag, then refresh sum.golang.org
        shell: sh
        run: |
          set -eux

          # Read module path from go.mod (works for typical go.mod files)
          module=$(awk '/^module /{print $2; exit}' go.mod)
          echo "Detected module: $module"

          # Try to determine the tag from common CI environment variables
          tag=""
          # If running on a ref like refs/tags/v1.2.3
          if [ -n "${GITHUB_REF:-}" ]; then
            tag=${GITHUB_REF#refs/tags/}
          fi

          # Gitea or other runners may set release/tag-specific vars; try common fallbacks
          tag=${tag:-${GITEA_RELEASE_TAG:-${EVENT_RELEASE_TAG:-}}}

          # If still empty, try to find an exact-match tag for the current commit
          if [ -z "$tag" ]; then
            tag=$(git describe --tags --exact-match 2>/dev/null || true)
          fi

          # If still empty, fall back to the latest tag reachable from HEAD
          if [ -z "$tag" ]; then
            tag=$(git describe --tags --abbrev=0 2>/dev/null || true)
          fi

          if [ -z "$tag" ]; then
            echo "No tag found for this run — nothing to refresh. Exiting."
            exit 0
          fi

          echo "Refreshing gosumdb for $module@$tag"

          # IMPORTANT: do not run `go get module@version` inside the module's own source tree
          # because `go` treats it as the main module and will refuse to request a version of it
          # (error: "can't request version ... of the main module").
          # To avoid that, run `go get` from a temporary module outside the repository.
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          # Create a minimal temporary go.mod without using a heredoc (avoids IDE/YAML
          # warnings about block scalars and is robust inside CI YAML run blocks).
          # Use the repository Go version to be safe.
          printf '%s\n' 'module refresh-gosumdb-temp' '' 'go 1.22' > go.mod

          # Use a China-friendly GOPROXY but keep the official sumdb so sum.golang.org is contacted when reachable.
          env GOSUMDB=sum.golang.org GOPROXY=https://goproxy.cn,direct GOFLAGS='' go get "$module@$tag"

          # Clean up
          cd - >/dev/null || true
          rm -rf "$TMPDIR"

  test:
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: go-1.26.2-alpine

    steps:
      - name: Ensure git is available and checkout repository (for tests)
        shell: sh
        run: |
          set -eux

          if ! command -v git >/dev/null 2>&1; then
            apk add --no-cache git openssh-client ca-certificates
          fi

          if [ -d .git ]; then
            echo "Repository already present, skipping clone."
            git rev-parse --abbrev-ref HEAD || true
            exit 0
          fi

          CLONE_URL="${GIT_CLONE_URL:-}"
          if [ -z "$CLONE_URL" ]; then
            if [ -n "${GITEA_REPOSITORY:-}" ]; then
              CLONE_URL="${GITEA_SERVER_URL:-https://gitea.example}/${GITEA_REPOSITORY}.git"
            elif [ -n "${GITHUB_REPOSITORY:-}" ]; then
              CLONE_URL="${GITHUB_SERVER_URL:-https://github.com}/${GITHUB_REPOSITORY}.git"
            fi
          fi

          if [ -z "$CLONE_URL" ]; then
            echo "No clone URL detected. Set GIT_CLONE_URL workflow variable (e.g. https://gitea.example/owner/repo.git)."
            exit 1
          fi

          git clone --depth=1 "${REF:-}" "$CLONE_URL" . 2>/dev/null || git clone --depth=1 "$CLONE_URL" .

      - name: Run go tests
        shell: sh
        run: |
          set -eux
          # Use China-friendly proxy for dependency downloads
          env GOPROXY=https://goproxy.cn,direct go test ./... -v


